<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rail Rider</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0e13;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 14px;
        font: 13px/1.5 system-ui, sans-serif;
        color: #cdd4de;
        user-select: none;
        pointer-events: none;
      }
      #hud h1 {
        font-size: 15px;
        margin: 0 0 6px;
        letter-spacing: 0.04em;
      }
      #hud .legend {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin: 8px 0;
      }
      #hud .swatch {
        display: inline-block;
        width: 22px;
        height: 4px;
        border-radius: 2px;
        margin-right: 8px;
        vertical-align: middle;
      }
      #hud .hint {
        color: #8b93a0;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud">Loading network…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
